* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif; }

.app {
  --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0; --text: #1e293b;
  --muted: #64748b; --node-fill: #ffffff; --node-text: #1e293b;
  --hover: #eef2ff; --grid-dot: #cbd5e1; --input-bg: #ffffff;
  --fb-spine: #475569;
  display: flex; flex-direction: column; height: 100vh; height: 100dvh;
  background: var(--bg); color: var(--text);
}
.app.dark {
  --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #e2e8f0;
  --muted: #94a3b8; --node-fill: #1e293b; --node-text: #e2e8f0;
  --hover: #312e81; --grid-dot: #334155; --input-bg: #0f172a;
  --fb-spine: #94a3b8;
}

.toolbar {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  padding: 7px 10px; background: var(--panel); border-bottom: 1px solid var(--border);
}
.toolbar button, .toolbar select {
  padding: 5px 9px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--panel); color: var(--text); font-size: 12.5px; cursor: pointer;
}
.toolbar button:hover:not(:disabled) { background: var(--hover); border-color: #6366f1; }
.toolbar button:disabled { opacity: .4; cursor: default; }
.toolbar button.active { background: #6366f1; color: #fff; border-color: #6366f1; }
.toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 3px; }
.map-select { max-width: 150px; }
.title-input {
  padding: 5px 9px; border: 1px solid transparent; border-radius: 8px;
  font-size: 13.5px; font-weight: 600; width: 150px; background: transparent; color: var(--text);
}
.title-input:hover, .title-input:focus { border-color: var(--border); background: var(--input-bg); outline: none; }
.linestyle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.linestyle button { border: 0 !important; border-radius: 0 !important; }
.saved-at { font-size: 11px; color: #10b981; margin-left: 4px; white-space: nowrap; }

.main { flex: 1; display: flex; min-height: 0; position: relative; }
.mobile-only { display: none !important; }

.outline {
  width: 220px; background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
.ol-head { display: flex; align-items: center; gap: 4px; padding: 10px 10px 6px; }
.ol-head .panel-title { flex: 1; margin: 0; }
.ol-head button {
  border: 1px solid var(--border); background: var(--panel); color: var(--text);
  border-radius: 6px; padding: 2px 7px; cursor: pointer; font-size: 12px;
}
.ol-head button:hover { background: var(--hover); }
.ol-search {
  margin: 0 10px 8px; padding: 5px 8px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 12px; background: var(--input-bg); color: var(--text);
}
.ol-body { flex: 1; overflow: auto; padding-bottom: 8px; }
.ol-row {
  display: flex; align-items: center; gap: 5px; padding: 3px 8px;
  font-size: 12.5px; cursor: pointer; border-radius: 6px; margin: 0 4px;
}
.ol-row:hover { background: var(--hover); }
.ol-row.sel { background: var(--hover); outline: 1px solid #6366f1; }
.ol-arrow { width: 14px; color: var(--muted); cursor: pointer; flex-shrink: 0; }
.ol-arrow-empty { width: 14px; flex-shrink: 0; }
.ol-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ol-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ol-text.done { text-decoration: line-through; opacity: .55; }
.ol-foot {
  padding: 7px 12px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}

.canvas { flex: 1; position: relative; overflow: hidden; }
.board {
  width: 100%; height: 100%; display: block; touch-action: none;
  background: var(--bg);
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
}

/* ======= スマホ / タブレット (iPhone最適化) ======= */
@media (max-width: 768px) {
  .mobile-only { display: inline-block !important; }
  .toolbar {
    flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .toolbar::-webkit-scrollbar { display: none; }
  .toolbar button, .toolbar select {
    flex: 0 0 auto; padding: 9px 12px; font-size: 14px;
  }
  .map-select { max-width: 110px; }
  .title-input { max-width: 110px; }
  /* アウトラインは左からのオーバーレイ */
  .outline {
    position: absolute; left: 0; top: 0; bottom: 0; z-index: 30;
    width: min(80vw, 300px);
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.25);
  }
  /* 詳細パネルは下からのシート */
  .panel {
    position: absolute; left: 0; right: 0; bottom: 0; top: auto; z-index: 25;
    width: auto !important; max-height: 46dvh; overflow-y: auto;
    border-left: none; border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.25);
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .panel input, .panel textarea, .panel select { font-size: 16px; } /* iOSの自動ズーム防止 */
  .ctx-menu button { padding: 11px 16px; font-size: 14px; }
  .toast { bottom: calc(16px + env(safe-area-inset-bottom)); }
}
.node { cursor: grab; }
.node:active { cursor: grabbing; }
.collapse-badge { cursor: pointer; }
.node-edit {
  width: 100%; height: 28px; border: 2px solid #0ea5e9; border-radius: 6px;
  padding: 0 6px; font-size: 13px; font-family: inherit; outline: none;
  background: var(--input-bg); color: var(--text);
}

.ctx-menu {
  position: absolute; z-index: 40; background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 10px 30px rgba(2,6,23,.25); padding: 4px; min-width: 200px;
}
.ctx-menu button {
  display: block; width: 100%; text-align: left; padding: 7px 10px; color: var(--text);
  border: 0; background: none; font-size: 12.5px; border-radius: 6px; cursor: pointer;
}
.ctx-menu button:hover:not(:disabled) { background: var(--hover); }
.ctx-menu button:disabled { opacity: .4; }
